// retirada com o mesmo código colidam nesse cache global compartilhado.
function _loteSet(ns, codigo, obj) { window._LOTES[ns+':'+codigo] = obj; }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escA(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function norm(s) { return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim(); }

function icon(name, cls) {
  var body = ICONS[name];
  if (!body) return '';
  return '<svg class="icon-svg'+(cls?' '+cls:'')+'" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+body+'</svg>';
}
function renderStaticIcons(root) {
  (root||document).querySelectorAll('[data-icon]').forEach(function(el){
    el.innerHTML = icon(el.getAttribute('data-icon'));
  });
}

var _toastT = null;
function toast(msg, tipo) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast '+(tipo||'info')+' show';
  clearTimeout(_toastT); _toastT = setTimeout(function(){ el.classList.remove('show'); }, 3500);
}

function mostrarSpinner(id) {
  document.getElementById(id).innerHTML = '<div class="loading"><div class="spinner"></div>Carregando...</div>';
}

function statusBadge(s) {
  var cls = { PENDENTE:'bs-pendente', APROVADO:'bs-aprovado', LIBERADO:'bs-liberado',
              CANCELADO:'bs-cancelado', RECUSADO:'bs-recusado', ADIADO:'bs-adiado',
              DEVOLVIDO:'bs-devolvido', 'EM_ANDAMENTO':'bs-em_andamento' };
  return '<span class="badge-status '+(cls[s]||'bs-pendente')+'">'+esc(s)+'</span>';
}

function tagTipo(tipo) {
  if (tipo === 'ambos')   return '<span class="tag-tipo tag-ambos">Físico + Digital</span>';
  if (tipo === 'digital') return '<span class="tag-tipo tag-digital">Digital</span>';
  return '<span class="tag-tipo tag-fisico">Físico</span>';
}

// Paginação client-side genérica (usada por Consulta e Retirada)
function renderPaginacao(containerId, total, pag, por, onPageFn) {
  var pagEl = document.getElementById(containerId);
  if (!pagEl) return;
  var totalPg = Math.ceil(total/por);
  if (totalPg <= 1) { pagEl.innerHTML = '<p style="text-align:center;font-size:.73rem;color:var(--texto-leve);">'+total+' resultado(s)</p>'; return; }
  var p='<div style="display:flex;gap:6px;align-items:center;justify-content:center;">';
  p+='<button style="width:32px;height:32px;border-radius:7px;border:1.5px solid var(--cinza-borda);background:#fff;cursor:pointer;font-size:.8rem;" '+(pag===1?'disabled':'')+' onclick="'+onPageFn+'('+(pag-1)+')">‹</button>';
  for(var i=Math.max(1,pag-2); i<=Math.min(totalPg,pag+2); i++){
    p+='<button style="width:32px;height:32px;border-radius:7px;border:1.5px solid '+(i===pag?'var(--azul-escuro)':'var(--cinza-borda)')+';background:'+(i===pag?'var(--azul-escuro)':'#fff')+';color:'+(i===pag?'#fff':'var(--texto-leve)')+';cursor:pointer;font-size:.8rem;font-weight:700;" onclick="'+onPageFn+'('+i+')">'+i+'</button>';
  }
  p+='<button style="width:32px;height:32px;border-radius:7px;border:1.5px solid var(--cinza-borda);background:#fff;cursor:pointer;font-size:.8rem;" '+(pag===totalPg?'disabled':'')+' onclick="'+onPageFn+'('+(pag+1)+')">›</button>';
  p+='</div><p style="text-align:center;font-size:.73rem;color:var(--texto-leve);margin-top:6px;">'+total+' resultado(s)</p>';
  pagEl.innerHTML = p;
}

// ══════════════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════════════
function switchTab(btn, grupo) {
  var tabId = btn.getAttribute('data-tab');
  var container = grupo ? document.querySelector('[data-tab^="'+grupo+'"]').closest('.page') : btn.closest('.page');
  container.querySelectorAll('.tab-btn[data-tab^="'+grupo+'"]').forEach(function(b){ b.classList.remove('active'); });
  container.querySelectorAll('.tab-pane').forEach(function(p){
    if(!grupo || p.id.indexOf(grupo)===0) p.classList.remove('active');
  });
  btn.classList.add('active');
  var pane = document.getElementById(tabId);
  if (pane) pane.classList.add('active');
}

// ══════════════════════════════════════════════════════════
//  MODAL GENÉRICO
// ══════════════════════════════════════════════════════════
function abrirModal(titulo, sub, corpo, mostrarConfirmar, labelConfirmar, clsConfirmar, fn, largura) {
  document.getElementById('modalTitulo').textContent=titulo;
  document.getElementById('modalSub').textContent=sub||'';
  document.getElementById('modalCorpo').innerHTML=corpo||'';
  var btn=document.getElementById('modalConfirmar');
  if(mostrarConfirmar){
    btn.style.display=''; btn.textContent=labelConfirmar||'Confirmar';
    btn.className='btn-confirm-modal'+(clsConfirmar?' '+clsConfirmar:'');
    _modalConfirmFn=fn;
  } else { btn.style.display='none'; _modalConfirmFn=null; }
  var inner=document.querySelector('#modalOverlay>div');
  if(inner) inner.style.maxWidth=largura||'680px';
  var ov=document.getElementById('modalOverlay'); ov.style.display='flex';
}
function fecharModal(){
  document.getElementById('modalOverlay').style.display='none';
  _modalConfirmFn=null;
  var inner=document.querySelector('#modalOverlay>div');
  if(inner) inner.style.maxWidth='680px';
}
function executarModalConfirm(){ if(_modalConfirmFn) _modalConfirmFn(); fecharModal(); }

// ══════════════════════════════════════════════════════════
//  PREVIEW DOCUMENTO
// ══════════════════════════════════════════════════════════
function abrirPreviewDocumento(url, nome) {
  var previewUrl = url;
  var match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) previewUrl = 'https://drive.google.com/file/d/' + match[1] + '/preview?rm=minimal';
  document.getElementById('previewTitulo').textContent = nome || 'Documento';
  document.getElementById('previewFrame').src = previewUrl;
  document.getElementById('modalPreviewOverlay').style.display = 'flex';
}
function fecharPreview() {
  document.getElementById('modalPreviewOverlay').style.display = 'none';
  document.getElementById('previewFrame').src = '';
}

//  DATA NO TOPO (cabeçalho da tarja branca)
// ══════════════════════════════════════════════════════════
(function(){
  var el = document.getElementById('topbarDate');
  if (!el) return;
  var texto = new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  el.textContent = texto.charAt(0).toUpperCase() + texto.slice(1);
})();
