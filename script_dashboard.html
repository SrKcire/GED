<script>
// ══════════════════════════════════════════════════════════
//  DASHBOARD ADM
// ══════════════════════════════════════════════════════════
function carregarDashAdm() {
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('mArqHoje').textContent=r.arquivamentosHoje||0;
    document.getElementById('mRetAbertas').textContent=(r.pendentes||0)+(r.liberados||0);
    document.getElementById('mDevPend').textContent=r.liberados||0;
    document.getElementById('mUsrAtivos').textContent=r.usuariosAtivos||0;
  }).getDashboard(S.email);

  // Carregar pendências
  google.script.run.withSuccessHandler(function(r){
    _admPendencias.ret = (r.lotes||[]).filter(function(l){return l.statusRetirada==='PENDENTE';});
    document.getElementById('pNumRet').textContent=_admPendencias.ret.length;
  }).getRetiradas('todos', S.email);

  google.script.run.withSuccessHandler(function(r){
    _admPendencias.arq = r.lotes||[];
    document.getElementById('pNumArq').textContent=_admPendencias.arq.length;
  }).getArquivamentos('pendentes', S.email);

  google.script.run.withSuccessHandler(function(r){
    _admPendencias.des = (r.descartes||[]).filter(function(d){return d.status==='PENDENTE';});
    document.getElementById('pNumDes').textContent=_admPendencias.des.length;
  }).getDescartes('pendentes', S.email);
}

function abrirModalPendencias(tipo) {
  var titulos={ret:'Retiradas aguardando liberação',arq:'Arquivamentos aguardando aprovação',des:'Descartes aguardando análise'};
  var lista = _admPendencias[tipo]||[];
  var dest  = tipo==='ret'?'retirada-adm':tipo==='arq'?'arquivar-adm':'descarte';

  if(lista.length===0){
    abrirModal(titulos[tipo],'','<div class="empty-state"><div class="empty-state-icon">'+icon('check')+'</div><p>Nenhuma pendência no momento.</p></div>',false);
    return;
  }

  var html='<div class="pendencias-modal-list">';
  lista.forEach(function(item){
    var cod = item.codigo||item.cod||'—';
    var resp= item.responsavel||'—';
    var dept= item.departamento||'—';
    var data= item.data||'—';
    var tipoLabel= tipo==='ret'?'Retirada':tipo==='arq'?'Arquivamento':'Descarte';
    var tipoClass= tipo==='ret'?'t-ret':tipo==='arq'?'t-arq':'t-des';
    html+='<div class="pendencias-modal-item" onclick="irParaPendencia(\''+esc(dest)+'\',\''+escA(cod)+'\')">'
      +'<span class="pmi-tipo '+tipoClass+'">'+tipoLabel+'</span>'
      +'<div class="pmi-info"><div class="pmi-cod">'+esc(cod)+'</div><div class="pmi-meta">'+esc(resp)+' · '+esc(dept)+' · '+esc(data)+'</div></div>'
      +'<span style="color:var(--azul-escuro);font-size:.8rem;">›</span>'
      +'</div>';
  });
  html+='</div>';
  abrirModal(titulos[tipo], lista.length+' solicitação(ões)', html, false);
}

function irParaPendencia(dest, cod) {
  fecharModal();
  navegar(dest);
  if(dest==='retirada-adm') carregarRetiradasAdm('pendente');
  else if(dest==='arquivar-adm') carregarArqAdm();
  else if(dest==='descarte') carregarDescarte();
}

// ══════════════════════════════════════════════════════════
//  DASHBOARD USUÁRIO
// ══════════════════════════════════════════════════════════
function carregarDashUser() {
  document.getElementById('dashUserBemVindo').textContent = 'Olá, '+S.nome.split(' ')[0]+'!';
  mostrarSpinner('userAtividades');
  var resultados = { arq:null, ret:null };

  function tentarRenderizar(){
    if(!resultados.arq || !resultados.ret) return;
    var html='';

    // Arquivamentos (agrupado por código — cada lote pode ter vários documentos/linhas)
    var lotesArq={};
    (resultados.arq.registros||[]).forEach(function(reg){
      var cod=reg['CÓDIGO']||'—';
      if(!lotesArq[cod]) lotesArq[cod]={codigo:cod,data:reg['DATA']||'',resp:reg['RESPONSÁVEL']||'',dept:reg['DEPARTAMENTO']||'',status:reg['STATUS']||'PENDENTE',docs:[]};
      lotesArq[cod].docs.push({ descricao: reg['DESCRIÇÃO / TIPO']||'—', informacao: reg['INFORMAÇÃO']||'' });
    });
    Object.values(lotesArq).forEach(function(l){ _loteSet('arq', l.codigo, l); });
    var arqFiltrado=Object.values(lotesArq).slice(0,5);

    html+='<div style="margin-bottom:24px;">';
    html+='<div style="font-family:\'Montserrat\',sans-serif;font-size:.72rem;font-weight:800;color:var(--texto-leve);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Meus arquivamentos</div>';
    if(arqFiltrado.length===0){ html+='<div style="font-size:.84rem;color:#94a3b8;padding:12px 0;">Nenhum arquivamento registrado.</div>'; }
    else {
      html+='<div class="user-activity-list">';
      arqFiltrado.forEach(function(l){
        html+='<div class="activity-item" style="cursor:pointer;" onclick="abrirModalHistArq(\''+escA(l.codigo)+'\')"><div class="activity-item-icon" style="background:#EFF6FF;">'+icon('archive')+'</div>'
          +'<div class="activity-item-body"><div class="activity-item-title">'+esc(l.codigo)+'</div>'
          +'<div class="activity-item-meta">'+esc(l.data)+'</div></div>'
          +statusBadge(l.status)+'</div>';
      });
      html+='</div>';
    }
    html+='</div>';

    // Retiradas (agrupado por código — cada lote pode ter vários documentos/linhas)
    var lotesRet={};
    (resultados.ret.registros||[]).forEach(function(reg){
      var cod=reg['CÓDIGO']||'—';
      if(!lotesRet[cod]) lotesRet[cod]={
        codigo:cod, data:reg['DATA']||'', status:reg['STATUS RETIRADA']||'PENDENTE',
        statusDev:reg['STATUS DEVOLUÇÃO']||'', email:reg['EMAIL']||'',
        responsavel:reg['RESPONSÁVEL']||'', departamento:reg['DEPARTAMENTO']||'',
        docs:[], caixas:[]
      };
      lotesRet[cod].docs.push(reg['DESCRIÇÃO']||'—');
      lotesRet[cod].caixas.push(reg['CAIXA']||'—');
    });
    Object.values(lotesRet).forEach(function(l){ _loteSet('ret', l.codigo, l); });
    var retFiltrado=Object.values(lotesRet).slice(0,5);

    html+='<div>';
    html+='<div style="font-family:\'Montserrat\',sans-serif;font-size:.72rem;font-weight:800;color:var(--texto-leve);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Minhas retiradas</div>';
    if(retFiltrado.length===0){ html+='<div style="font-size:.84rem;color:#94a3b8;padding:12px 0;">Nenhuma retirada registrada.</div>'; }
    else {
      html+='<div class="user-activity-list">';
      retFiltrado.forEach(function(l){
        html+='<div class="activity-item" style="cursor:pointer;" onclick="abrirModalHistRetUser(\''+escA(l.codigo)+'\')"><div class="activity-item-icon" style="background:#F0FDF4;">'+icon('upload')+'</div>'
          +'<div class="activity-item-body"><div class="activity-item-title">'+esc(l.codigo)+'</div>'
          +'<div class="activity-item-meta">'+esc(l.data)+' · '+esc(l.departamento)+'</div></div>'
          +statusBadge(l.status)+'</div>';
      });
      html+='</div>';
    }
    html+='</div>';

    document.getElementById('userAtividades').innerHTML = html;
  }

  google.script.run
    .withSuccessHandler(function(r){ resultados.arq=r; tentarRenderizar(); })
    .withFailureHandler(function(){
      document.getElementById('userAtividades').innerHTML='<div class="empty-state"><div class="empty-state-icon">'+icon('alert')+'</div><p>Erro ao carregar suas atividades. Tente novamente.</p></div>';
    })
    .buscarHistorico('arquivamento', S.email);
  google.script.run
    .withSuccessHandler(function(r){ resultados.ret=r; tentarRenderizar(); })
    .withFailureHandler(function(){
      document.getElementById('userAtividades').innerHTML='<div class="empty-state"><div class="empty-state-icon">'+icon('alert')+'</div><p>Erro ao carregar suas atividades. Tente novamente.</p></div>';
    })
    .buscarHistorico('retirada', S.email);
}
</script>
